<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human-AI Synergy Study</title>

    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.2.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>

    <style>
        /* 1. GLOBALES SETUP */
        * { box-sizing: border-box; }
        body {
            background-color: #0f172a;
            margin: 0;
            min-height: 100vh;
            font-family: sans-serif;
        }

        /* 2. RESPONSIVES EXPERIMENT-LAYOUT (Skaliert auf Curved-Monitoren!) */
        .experiment-container {
            display: flex;
            flex-direction: row;
            width: 95vw;          /* 95% der Bildschirmbreite */
            height: 85vh;         /* 85% der Bildschirmhöhe */
            max-width: 2500px;    /* Genug Platz für riesige Curved-Screens */
            background-color: #000;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid #334155;
            margin: 0 auto;
        }

        /* Die linke Seite mit dem Bild */
        .image-container {
            flex: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #111;
            padding: 20px;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Behält das Seitenverhältnis bei! */
        }

        /* Das KI-Panel auf der rechten Seite */
        .right-column {
            flex: 1;
            background: #1e293b;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-left: 2px solid #334155;
            min-width: 300px;
        }

        /* 3. BUTTONS & UI */
        .action-btn {
            background: #deff9a;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            text-transform: uppercase;
            width: 100%;
        }
        .action-btn:hover { transform: scale(1.02); }
        .action-btn:disabled { background: #555; color: #888; cursor: not-allowed; transform: none; }
        
        .btn-reset { background: #d9534f; color: white; }

        .ki-ring {
            position: absolute;
            border: 3px solid #deff9a;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            cursor: crosshair;
            z-index: 10;
        }
        .ki-ring:hover { background: rgba(222, 255, 154, 0.2); }

        .ki-number {
            display: inline-block;
            width: 24px; height: 24px;
            background: #334155; color: white;
            border-radius: 50%;
            text-align: center; line-height: 24px;
            margin-right: 10px; font-weight: bold;
        }

        .text-orange { color: #f08e16; font-weight: bold; }
        .text-blue { color: #2660c4; font-weight: bold; }

        /* 4. EYE-TRACKER KALIBRIERUNG */
        .calib-dot {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(255,0,0,0.8);
        }
    </style>
</head>
<body>
<script>
/**
 * STREAMING_CHUNK:Initializing global configuration variables...
 * ==============================================================================
 * 1. GLOBALE KONFIGURATION
 * ==============================================================================
 */
const OSF_EXPERIMENT_ID = "cCjHlcNaaWJr";

const ANZAHL_TRAINING_RUNDEN = 5; 
const ANZAHL_RUNDEN = 80;         
const RUNDEN_OHNE_DRIFT = 9;      

let ANZAHL_DRIFT_RINGE = 3; 
let RUNDEN_DAUER_SEK = 15;      
let SEQUENZ_SCHRITT_MS = 600;   

const FIXATION_DAUER_MS = 5000;   

const subject_id = Math.random().toString(36).substring(2, 10);
const dateiName = `proband_${subject_id}.csv`;

let aktuelleZeichenDaten = [];
let aktuelleVersuchsGruppe = 0; 
let aiName = "AI ASSISTANT";
let experimentAborted = false; 

// Die dynamische Konfiguration (Standard für Gruppe 1)
let probandenConfig = [
    { category: 'bg', value: 'dark', label: 'Background', valueLabel: 'Dark areas' },
    { category: 'color', value: 'orange', label: 'Color', valueLabel: '<span class="text-orange">Orange</span>' },
    { category: 'shape', value: 'round', label: 'Shape', valueLabel: 'Round (O; Q)' },
    { category: 'size', value: 'large', label: 'Size', valueLabel: 'Large elements' }
];

/**
 * STREAMING_CHUNK:Defining core logic and responsive rendering functions...
 * ==============================================================================
 * 2. LOGIK & FUNKTIONEN
 * ==============================================================================
 */
function berechneDrift(runde) {
    if (runde <= RUNDEN_OHNE_DRIFT) return 0.0;
    const startWert = 0.05; 
    const wachstumsRate = 0.1; 
    return startWert * Math.exp(wachstumsRate * (runde - RUNDEN_OHNE_DRIFT));
}

// NEU: Render-Funktion empfängt nun die Skalierungs-Parameter
function renderRing(containerId, originalX, originalY, elementSize, driftRatio, zeichenObjekt, scaleRatio, offsetX, offsetY) {
    const container = document.getElementById(containerId);
    if (!container) return;

    const baseRadius = (elementSize === 'groß') ? (19 * 1.6) : (12 * 1.6);
    const baseDiameter = baseRadius * 2;
    const driftAngle = Math.PI / 4; 
    
    // Position inkl. Drift im Original-Koordinatensystem
    const currentX = originalX + (Math.cos(driftAngle) * (baseRadius * driftRatio));
    const currentY = originalY + (Math.sin(driftAngle) * (baseRadius * driftRatio));

    // SKALIERUNG AUF DEN CURVED-MONITOR:
    // Wir multiplizieren die Original-X/Y mit dem Scale-Faktor und addieren den schwarzen Rand (Offset)
    const scaledX = (currentX * scaleRatio) + offsetX;
    const scaledY = (currentY * scaleRatio) + offsetY;
    const scaledDiameter = baseDiameter * scaleRatio;

    const ringElement = document.createElement('div');
    ringElement.classList.add('ki-ring'); 
    ringElement.style.width = scaledDiameter + 'px';
    ringElement.style.height = scaledDiameter + 'px';
    ringElement.style.left = scaledX + 'px';
    ringElement.style.top = scaledY + 'px';

    ringElement.addEventListener('click', function(e) {
        e.stopPropagation(); 
        ringElement.remove();
        if (zeichenObjekt) zeichenObjekt.hat_ring = false;
    });

    container.appendChild(ringElement);
}

function ladeTabelleUndBereiteVor(csvDateiPfad, aktuelleRunde, isTraining, callback) {
    Papa.parse(csvDateiPfad, {
        download: true,
        header: true,
        dynamicTyping: true, 
        complete: function(results) {
            aktuelleZeichenDaten = results.data.filter(z => z.shape);
            
            const isTrue = (val) => val === true || val === "True" || val === "true" || val === 1;

            aktuelleZeichenDaten.forEach(z => {
                z.is_small = isTrue(z.is_small);
                z.bg_dark = isTrue(z.bg_dark);

                z.hat_ring = false; 
                z.wird_verschoben = false; 
                
                const isBlueL = (z.shape === 'L' && z.color_hex === '#0064FF');
                const isOrangeO = (z.shape === 'O' && z.color_hex === '#FF8C00');
                z.ist_ziel = (isBlueL || isOrangeO);
                
                let markiert = z.ist_ziel; 
                if (z.bekommt_kreis !== undefined) {
                    markiert = isTrue(z.bekommt_kreis);
                }
                
                z.ki_setzt_ring = isTraining ? false : markiert; 
            });

            if (!isTraining) {
                const aktuellerDrift = berechneDrift(aktuelleRunde);
                let ausgewaehlteDrifter = [];
                
                if (aktuellerDrift > 0) {
                    let kandidaten = aktuelleZeichenDaten.filter(z => z.ki_setzt_ring && z.is_small);
                    ausgewaehlteDrifter = kandidaten.sort(() => 0.5 - Math.random()).slice(0, ANZAHL_DRIFT_RINGE);
                    ausgewaehlteDrifter.forEach(z => z.wird_verschoben = true);
                }

                aktuelleZeichenDaten.forEach(z => {
                    if (ausgewaehlteDrifter.includes(z)) {
                        z.render_gruppe = 5; 
                    } else if (z.ki_setzt_ring) {
                        
                        let zugewiesen = false;
                        for (let i = 0; i < probandenConfig.length; i++) {
                            const conf = probandenConfig[i];
                            let isMatch = false;
                            
                            if (conf.category === 'bg') {
                                isMatch = (conf.value === 'dark' && z.bg_dark) || (conf.value === 'light' && !z.bg_dark);
                            } else if (conf.category === 'color') {
                                isMatch = (conf.value === 'orange' && z.color_hex === '#FF8C00') || (conf.value === 'blue' && z.color_hex === '#0064FF');
                            } else if (conf.category === 'shape') {
                                isMatch = (conf.value === 'round' && (z.shape === 'O' || z.shape === 'Q')) || (conf.value === 'angular' && (z.shape === 'L' || z.shape === 'T'));
                            } else if (conf.category === 'size') {
                                isMatch = (conf.value === 'small' && z.is_small) || (conf.value === 'large' && !z.is_small);
                            }

                            if (isMatch) {
                                z.render_gruppe = i + 1; 
                                zugewiesen = true;
                                break; 
                            }
                        }
                        
                        if (!zugewiesen) {
                            z.render_gruppe = 5; 
                        }
                    }
                });
            }

            if (callback) callback();
        },
        error: function(err) { console.error("Fehler beim Laden:", err); }
    });
}

function createInfoScreen(title, contentHtml, btnText = "Next") {
    return `
        <div style="background:#0f172a; padding:40px; color:white; text-align:center; border-radius: 8px; max-width: 600px; margin: 40px auto; border: 1px solid #334155;">
            <h2 style="color:#deff9a; margin-top:0;">${title}</h2>
            <div style="font-size: 18px; line-height: 1.6; margin-bottom: 30px; text-align: left;">
                ${contentHtml}
            </div>
            <div style="text-align: center;">
                <button class="action-btn" style="width:auto; padding: 12px 30px;" onclick="jsPsych.finishTrial()">${btnText}</button>
            </div>
        </div>
    `;
}

/**
 * STREAMING_CHUNK:Setting up jsPsych timeline and DataPipe connection...
 * ==============================================================================
 * 3. JSPSYCH TIMELINE & ABLAUF
 * ==============================================================================
 */
const jsPsych = initJsPsych({
    on_finish: function() {
        if(aktuelleVersuchsGruppe === 3 || aktuelleVersuchsGruppe === 4) { // Admin Skip oder Kalibrierung speichern nichts
            jsPsych.data.displayData(); 
            return;
        }
        console.log("Sende Daten an OSF...");
        fetch("https://pipe.jspsych.org/api/data/", {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "*/*" },
            body: JSON.stringify({
                experimentID: OSF_EXPERIMENT_ID,
                filename: dateiName,
                data: jsPsych.data.get().csv()
            }),
        }).catch(err => console.error(err));
        
        document.body.innerHTML = '<div style="text-align:center; margin-top:20vh; color:white;"><h1>Data Saved!</h1><p>You may close this window now.</p></div>';
    }
});

let timeline = [];
let menu_choice = 0; // Hilfsvariable für den Loop

const main_menu = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
        <div style="background:#0f172a; padding:40px; color:white; text-align:center; border-radius: 8px; max-width: 600px; margin: 40px auto; border: 1px solid #334155;">
            <h1 style="color:#deff9a; margin-top:0;">Experiment Setup</h1>
            <p>Wähle den Modus für diesen Probanden:</p>
        </div>
    `,
    choices: ['1. Standard (Ohne Konfig)', '2. Interaktiv (Mit Konfig)', '3. Admin Skip', '4. Eye-Tracker Kalibrierung'],
    on_finish: function(data) {
        menu_choice = data.response + 1; 
        aktuelleVersuchsGruppe = menu_choice; 
    }
};

const admin_config_trial = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
        <div style="background:#0f172a; padding:40px; color:white; text-align:left; border-radius: 8px; max-width: 600px; margin: 40px auto; border: 1px solid #334155;">
            <h2 style="color:#d9534f; margin-top:0; text-align:center;">Admin Quick-Config</h2>
            
            <div style="margin-bottom: 20px;">
                <label style="color:#32b5a1; font-weight:bold;">Rundendauer (Sekunden):</label>
                <input type="number" id="adm-time" value="${RUNDEN_DAUER_SEK}" style="width:100%; padding:10px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="color:#32b5a1; font-weight:bold;">Anzahl Drift-Ringe:</label>
                <input type="number" id="adm-drift" value="${ANZAHL_DRIFT_RINGE}" style="width:100%; padding:10px;">
            </div>
            <div style="margin-bottom: 30px;">
                <label style="color:#32b5a1; font-weight:bold;">Sequenz-Speed (ms):</label>
                <input type="number" id="adm-seq" value="${SEQUENZ_SCHRITT_MS}" style="width:100%; padding:10px;">
            </div>
            <div style="text-align:center;">
                <button id="save-adm" class="action-btn btn-reset" style="width:auto;">Starten</button>
            </div>
        </div>
    `,
    choices: [],
    on_load: function() {
        document.getElementById('save-adm').addEventListener('click', function() {
            RUNDEN_DAUER_SEK = parseInt(document.getElementById('adm-time').value) || 15;
            ANZAHL_DRIFT_RINGE = parseInt(document.getElementById('adm-drift').value) || 3;
            SEQUENZ_SCHRITT_MS = parseInt(document.getElementById('adm-seq').value) || 600;
            jsPsych.finishTrial();
        });
    }
};

// NEU: Der statische 9-Punkte-Bildschirm
const calibration_screen = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
        <div style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000; z-index:9999;">
            <!-- Top Row -->
            <div class="calib-dot" style="top:5%; left:5%;"></div>
            <div class="calib-dot" style="top:5%; left:50%;"></div>
            <div class="calib-dot" style="top:5%; left:95%;"></div>
            <!-- Middle Row -->
            <div class="calib-dot" style="top:50%; left:5%;"></div>
            <div class="calib-dot" style="top:50%; left:50%;"></div>
            <div class="calib-dot" style="top:50%; left:95%;"></div>
            <!-- Bottom Row -->
            <div class="calib-dot" style="top:95%; left:5%;"></div>
            <div class="calib-dot" style="top:95%; left:50%;"></div>
            <div class="calib-dot" style="top:95%; left:95%;"></div>
            
            <button class="action-btn" style="position:absolute; bottom:5%; left:50%; transform:translateX(-50%); width:300px; z-index:10000;" onclick="jsPsych.finishTrial()">Kalibrierung Beenden</button>
        </div>
    `,
    choices: []
};

// Logik: Wir bauen eine Loop, falls der Admin nach der Kalibrierung zurück ins Menü will
const setup_loop = {
    timeline: [
        main_menu, 
        { timeline: [admin_config_trial], conditional_function: () => menu_choice === 3 },
        { timeline: [calibration_screen], conditional_function: () => menu_choice === 4 }
    ],
    // Wiederhole das Setup, WENN 4 gedrückt wurde. Sonst gehe weiter im Experiment.
    loop_function: function() {
        if(menu_choice === 4) return true;
        return false;
    }
};
timeline.push(setup_loop);

let intro_timeline = [
    { type: jsPsychHtmlButtonResponse, choices: [], stimulus: createInfoScreen("Context", "<p>Imagine you are working for a company that manufactures and maintains metal components.</p><p>Your task is image-based components inspection. You will examine radiographic images of parts and mark indications that may signal a material defect.</p><p>This kind of inspection is safety-relevant: if a defect is missed, the part can fail in service; if a sound part is flagged in error, it causes unnecessary cost and delay. Both kinds of error should be avoided.</p>") },
    { type: jsPsychHtmlButtonResponse, choices: [], stimulus: createInfoScreen("The Task", "<p>You will be shown abstracted images of components one after another.</p><p>Your task is to find defects and mark them by clicking on them, so that the component can be repaired.</p>") },
    { type: jsPsychHtmlButtonResponse, choices: [], stimulus: createInfoScreen("Rules", "<p>A defect is always indicated by a <strong style='color:#2660c4;'>blue L</strong> or an <strong style='color:#f08e16;'>orange O</strong>.</p><p>All other colour-letter combinations do not represent defects.</p><p>You can undo your selection by clicking on a marked item again.</p>") },
    { type: jsPsychHtmlButtonResponse, choices: [], stimulus: createInfoScreen("Practice", "<p>Next, you will practise the task.</p><p><strong>Remember:</strong> Your task is to find blue Ls and orange Os by clicking on them, as they represent defects.</p>", "Start Training") }
];
timeline.push({ timeline: intro_timeline, conditional_function: () => aktuelleVersuchsGruppe === 1 || aktuelleVersuchsGruppe === 2 });

let training_timeline = []; 
for (let t = 1; t <= ANZAHL_TRAINING_RUNDEN; t++) {
    const formatierteNummer = String(t).padStart(3, '0');
    
    training_timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `
        <div class="experiment-container">
            <div id="image-wrapper" class="image-container">
                <img src="bilder/stimulus_${formatierteNummer}.jpg" />
            </div>
            <div class="right-column">
                <div style="background:#1e2229; padding:20px; border-radius:10px; color:white;">
                    <h3 style="margin-top:0; border-bottom:1px solid #333; padding-bottom:10px;">TRAINING (${t}/${ANZAHL_TRAINING_RUNDEN})</h3>
                    <p style="color:#e0e0e0;">Markiere alle <strong style="color:#2660c4;">blauen Ls</strong> und <strong style="color:#f08e16;">orangen Os</strong>.</p>
                </div>
                <button id="finish-training-btn" class="action-btn">Weiter</button>
            </div>
        </div>
        `,
        choices: [],
        on_load: function() {
            const imageWrapper = document.getElementById('image-wrapper');
            const imgEl = imageWrapper.querySelector('img');
            
            let scaleRatio = 1;
            let offsetX = 0;
            let offsetY = 0;

            // ERMITTLUNG DER DYNAMISCHEN SKALIERUNG!
            function calculateScale() {
                const imgRect = imgEl.getBoundingClientRect();
                const wrapperRect = imageWrapper.getBoundingClientRect();
                if (imgRect.width === 0) return; // Verhindert Fehler, wenn Bild noch lädt

                const naturalWidth = imgEl.naturalWidth || 1920; 

                // Wirkt Wunder: Browser sagt uns EXAKT, wie groß er das Bild gerendert hat!
                scaleRatio = imgRect.width / naturalWidth;
                
                // Offset = Abstand vom gerenderten Bild zum Rand des Containers (wg. CSS Padding)
                offsetX = imgRect.left - wrapperRect.left;
                offsetY = imgRect.top - wrapperRect.top;
            }

            imgEl.onload = calculateScale;
            if (imgEl.complete) calculateScale(); // Falls das Bild im Cache war
            window.addEventListener('resize', calculateScale);

            ladeTabelleUndBereiteVor(`tabellen/stimulus_${formatierteNummer}.csv`, 0, true, () => {
                calculateScale();
            });
            
            document.getElementById('finish-training-btn').addEventListener('click', () => {
                window.removeEventListener('resize', calculateScale);
                jsPsych.finishTrial({ runde: t, is_training: true }); 
            });

            imageWrapper.addEventListener('click', function(e) {
                if (aktuelleZeichenDaten.length === 0) return;
                
                // Wir holen uns die EXAKTEN Koordinaten des gerenderten Bildes
                const imgRect = imgEl.getBoundingClientRect();
                
                // Klickposition umrechnen auf Original-CSV-Größe - EXAKT auf dem Bild!
                const origKlickX = (e.clientX - imgRect.left) / scaleRatio;
                const origKlickY = (e.clientY - imgRect.top) / scaleRatio;

                let naechstesZeichen = null;
                let minimaleDistanz = Infinity;
                
                aktuelleZeichenDaten.forEach(z => {
                    const distanz = Math.sqrt(Math.pow(origKlickX - z.center_x, 2) + Math.pow(origKlickY - z.center_y, 2));
                    if (distanz < minimaleDistanz) { minimaleDistanz = distanz; naechstesZeichen = z; }
                });

                if (naechstesZeichen && minimaleDistanz <= 40 && !naechstesZeichen.hat_ring) {
                    const groesse = naechstesZeichen.is_small ? 'klein' : 'groß';
                    // Skalierungs-Infos an den Ring-Bauer übergeben
                    renderRing('image-wrapper', naechstesZeichen.center_x, naechstesZeichen.center_y, groesse, 0.0, naechstesZeichen, scaleRatio, offsetX, offsetY);
                    naechstesZeichen.hat_ring = true;
                }
            });
        }
    });
}
timeline.push({ timeline: training_timeline, conditional_function: () => aktuelleVersuchsGruppe === 1 || aktuelleVersuchsGruppe === 2 });

// ==========================================
// 4. KI INTRO & CUSTOMIZATION
// ==========================================
timeline.push({ timeline: [{ type: jsPsychHtmlButtonResponse, choices: [], stimulus: createInfoScreen("AI Assistance Enabled", "<p>For on-site defect detection, your company decided to use intelligent (AI) assistance systems.</p><p>In the next phase, an AI agent will be available to you during the detection task.</p><p>The AI will assist you by marking defects. You have 15 seconds per component. Together with the AI's assistance, find as many defects as possible while avoiding false alarms.</p>", "Start Main Task"), on_load: () => document.getElementById('custom-next-btn').addEventListener('click', () => jsPsych.finishTrial()) }], conditional_function: () => aktuelleVersuchsGruppe === 1 });
timeline.push({ timeline: [{ type: jsPsychHtmlButtonResponse, choices: [], stimulus: createInfoScreen("Well done!", "<p>For on-site defect detection, your company decided to use intelligent (AI) assistance systems.</p><p>In the next phase, an AI agent will be available to you during the detection task.</p>"), on_load: () => document.getElementById('custom-next-btn').addEventListener('click', () => jsPsych.finishTrial()) }], conditional_function: () => aktuelleVersuchsGruppe === 2 });

const customization_name_trial = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
        <div style="background:#0f172a; padding:40px; color:white; text-align:center; border-radius: 8px; max-width: 600px; margin: 40px auto; border: 1px solid #334155;">
            <h2 style="color:#deff9a; margin-top:0;">Agent Identification</h2>
            <p style="margin-bottom: 20px; font-size: 18px; text-align: left;">Before working with your AI agent, please take some time to customize it, based on your job as a defect inspector.</p>
            <p style="margin-bottom: 20px; font-size: 18px; text-align: left;">First, give your AI agent an identification so that your settings can be saved. Identifications consist of 2 letters and 2 numbers (e.g. AI01).</p>
            <input type="text" id="ai-name-input" style="padding:10px; font-size:20px; margin-bottom:30px; text-align: center; width: 100%; max-width: 200px;" placeholder="AI01" maxlength="4"><br>
            <button id="save-name-btn" class="action-btn" style="width:auto;">Next</button>
        </div>`,
    choices: [],
    on_load: function() { document.getElementById('save-name-btn').addEventListener('click', function() { const inputVal = document.getElementById('ai-name-input').value.trim(); if(inputVal !== "") aiName = inputVal.toUpperCase(); jsPsych.finishTrial(); }); }
};

const customization_settings_trial = {
    type: jsPsychHtmlButtonResponse,
    stimulus: function() {
        function makeRow(num, def) {
            return `<div style="margin-bottom: 15px; display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;">
                <strong style="color:#32b5a1; font-size: 18px; width: 100px;">Priority ${num}:</strong>
                <select id="cat-${num}" style="padding: 8px; font-size: 16px;"><option value="bg" ${def==='bg'?'selected':''}>Background</option><option value="color" ${def==='color'?'selected':''}>Color</option><option value="shape" ${def==='shape'?'selected':''}>Shape</option><option value="size" ${def==='size'?'selected':''}>Size</option></select>
                <select id="val-${num}" style="padding: 8px; font-size: 16px; width: 200px;"></select>
            </div>`;
        }
        return `
        <div style="background:#0f172a; padding:40px; color:white; text-align:left; border-radius: 8px; max-width: 800px; margin: 40px auto; border: 1px solid #334155;">
            <h2 style="color:#deff9a; margin-top:0; text-align:center;">Configure ${aiName}</h2>
            <p style="text-align:center; margin-bottom:30px; font-size: 18px;">According to your own strategy, rank the categories and select what to look for.</p>
            <div id="error-msg" style="color:#d9534f; display:none; text-align:center; margin-bottom:15px; font-weight:bold;">Please select each category exactly once!</div>
            ${makeRow(1, 'bg')} ${makeRow(2, 'color')} ${makeRow(3, 'shape')} ${makeRow(4, 'size')}
            <div style="text-align: center; margin-top: 30px;"><button id="save-config-btn" class="action-btn" style="width:auto;">Submit Settings</button></div>
        </div>`;
    },
    choices: [],
    on_load: function() {
        const catData = { bg: [{v:'dark', t:'Dark areas'}, {v:'light', t:'Light areas'}], color: [{v:'orange', t:'Orange'}, {v:'blue', t:'Blue'}], shape: [{v:'round', t:'Round (O; Q)'}, {v:'angular', t:'Angular (L; T)'}], size: [{v:'large', t:'Large elements'}, {v:'small', t:'Small elements'}] };
        function updateSub(rowNum) { const c = document.getElementById('cat-'+rowNum), v = document.getElementById('val-'+rowNum); v.innerHTML = ''; catData[c.value].forEach(opt => v.innerHTML += '<option value="' + opt.v + '">' + opt.t + '</option>'); }
        for (let i = 1; i <= 4; i++) { updateSub(i); document.getElementById('cat-'+i).addEventListener('change', () => updateSub(i)); }
        document.getElementById('save-config-btn').addEventListener('click', function() {
            let selected = []; for(let i=1; i<=4; i++) selected.push(document.getElementById('cat-'+i).value);
            if(new Set(selected).size !== 4) return document.getElementById('error-msg').style.display = 'block';
            probandenConfig = [];
            for(let i=1; i<=4; i++) {
                let c = document.getElementById('cat-'+i), v = document.getElementById('val-'+i);
                let cL = c.options[c.selectedIndex].text, vL = v.options[v.selectedIndex].text;
                if(c.value === 'color' && v.value === 'orange') vL = '<span class="text-orange">Orange</span>';
                if(c.value === 'color' && v.value === 'blue') vL = '<span class="text-blue">Blue</span>';
                probandenConfig.push({ category: c.value, value: v, label: cL, valueLabel: vL });
            }
            jsPsych.finishTrial(); 
        });
    }
};

timeline.push({ timeline: [customization_name_trial, customization_settings_trial, { type: jsPsychHtmlButtonResponse, choices: [], stimulus: () => createInfoScreen("Ready to inspect", `<p>${aiName} is configured. Now you do the defect inspection together with ${aiName}.</p><p>Your task is again to find defects and mark them by clicking on them. Again, missing defects and marking non-defects are critical errors and should be avoided.</p><p>You have 15 seconds per component.</p><p style="color:#888; font-size:14px;">If necessary, you can use the "recalibrate" button on the right to abort. Use the button carefully.</p>`, "Start Main Task"), on_load: () => document.getElementById('custom-next-btn').addEventListener('click', () => jsPsych.finishTrial()) }], conditional_function: () => aktuelleVersuchsGruppe === 2 });

// ==========================================
// 5. HAUPT-RUNDEN SCHLEIFE
// ==========================================
for (let runde = 1; runde <= ANZAHL_RUNDEN; runde++) {
    const formatierteNummer = String(runde).padStart(3, '0');

    const runden_trial = {
        type: jsPsychHtmlButtonResponse,
        stimulus: function() {
            let kiListHtml = ''; probandenConfig.forEach((conf, index) => { kiListHtml += `<li class="scan-step" id="step-${index+1}" style="opacity:0.3; margin-bottom:10px;"><span class="ki-number">${index+1}</span> ${conf.label}: ${conf.valueLabel}</li>`; });
            kiListHtml += `<li class="scan-step" id="step-5" style="opacity:0.3; color:#d9534f; margin-bottom:10px;"><span class="ki-number" style="background:#d9534f; color:#fff;">5</span> Final Anomaly Scan</li>`;
            const adminBtn = aktuelleVersuchsGruppe === 3 ? `<button id="admin-next-btn" class="action-btn" style="margin-bottom: 10px; background:#3b82f6;" disabled>Weiter (Admin)</button>` : ``;

            return `
            <div class="experiment-container">
                <div id="image-wrapper" class="image-container">
                    <img src="bilder/stimulus_${formatierteNummer}.jpg" />
                </div>
                <div class="right-column">
                    <div>
                        <h3 style="color:white; border-bottom:1px solid #333; padding-bottom:10px; margin-top:0;">${aiName} <span style="float:right; color:#f08e16; font-size:14px;" id="scan-status">SCANNING...</span></h3>
                        <ul style="list-style:none; padding:0; color:white;">${kiListHtml}</ul>
                    </div>
                    <div style="text-align: center;">
                        <div id="countdown-timer" style="color:white; margin-bottom: 12px; font-weight: bold;">Ready...</div>
                        ${adminBtn}
                        <button id="custom-reset-btn" class="action-btn btn-reset" disabled>Recalibrate</button>
                    </div>
                </div>
            </div>`;
        },
        choices: [],
        on_finish: function(data) { if (data.beendigungs_grund === 'reset') experimentAborted = true; },
        on_load: function() {
            const resetBtn = document.getElementById('custom-reset-btn');
            const timerDisplay = document.getElementById('countdown-timer');
            const imageWrapper = document.getElementById('image-wrapper');
            const imgEl = imageWrapper.querySelector('img');
            const adminNextBtn = document.getElementById('admin-next-btn'); 
            let countdownInterval;
            let isScanFinished = false;

            let scaleRatio = 1, offsetX = 0, offsetY = 0;

            function calculateScale() {
                const imgRect = imgEl.getBoundingClientRect();
                const wrapperRect = imageWrapper.getBoundingClientRect();
                if (imgRect.width === 0) return;

                const nw = imgEl.naturalWidth || 1920;
                
                scaleRatio = imgRect.width / nw;
                offsetX = imgRect.left - wrapperRect.left;
                offsetY = imgRect.top - wrapperRect.top;
            }
            imgEl.onload = calculateScale;
            if (imgEl.complete) calculateScale();
            window.addEventListener('resize', calculateScale);

            ladeTabelleUndBereiteVor(`tabellen/stimulus_${formatierteNummer}.csv`, runde, false, () => {
                calculateScale();
                let currentStep = 1, aktuellerDrift = berechneDrift(runde);
                
                let sequenceInterval = setInterval(() => {
                    document.querySelectorAll('.scan-step').forEach(el => { el.style.opacity = '0.3'; el.style.color = ''; });
                    const stepEl = document.getElementById(`step-${currentStep}`);
                    if(stepEl) { stepEl.style.opacity = '1.0'; stepEl.style.color = '#deff9a'; }

                    aktuelleZeichenDaten.forEach(z => {
                        if (z.ki_setzt_ring && z.render_gruppe === currentStep) {
                            renderRing('image-wrapper', z.center_x, z.center_y, z.is_small ? 'klein' : 'groß', z.wird_verschoben ? aktuellerDrift : 0.0, z, scaleRatio, offsetX, offsetY);
                            z.hat_ring = true;
                        }
                    });
                    currentStep++;

                    if (currentStep > 5) {
                        clearInterval(sequenceInterval);
                        document.getElementById('scan-status').innerText = "ASSISTING"; document.getElementById('scan-status').style.color = "#32b5a1";
                        resetBtn.disabled = false; if (adminNextBtn) adminNextBtn.disabled = false; 
                        isScanFinished = true;
                        
                        let timeLeft = RUNDEN_DAUER_SEK;
                        timerDisplay.innerText = aktuelleVersuchsGruppe === 3 ? "Admin Modus" : `Continue in ${timeLeft}...`;
                        countdownInterval = setInterval(() => { timeLeft--; if(aktuelleVersuchsGruppe !== 3) timerDisplay.innerText = `Continue in ${timeLeft}...`; if (timeLeft <= 0) beendeRunde('timeout'); }, 1000);
                    }
                }, SEQUENZ_SCHRITT_MS);
            });

            function beendeRunde(grund) {
                clearInterval(countdownInterval); window.removeEventListener('resize', calculateScale);
                let ki_f_kor = 0, ki_verg_gef = 0, prob_falsch = 0;    
                aktuelleZeichenDaten.forEach(z => {
                    if (!z.ist_ziel && z.ki_setzt_ring && !z.hat_ring) ki_f_kor++;
                    if (z.ist_ziel && !z.ki_setzt_ring && z.hat_ring) ki_verg_gef++;
                    if (!z.ist_ziel && !z.ki_setzt_ring && z.hat_ring) prob_falsch++;
                });
                jsPsych.finishTrial({ runde: runde, versuchsgruppe: aktuelleVersuchsGruppe, beendigungs_grund: grund, korrigierte_falsche_ki_ringe: ki_f_kor, gefundene_vergessene_ki_ringe: ki_verg_gef, proband_falsch_markiert: prob_falsch });
            }

            resetBtn.addEventListener('click', () => beendeRunde('reset'));
            if (adminNextBtn) adminNextBtn.addEventListener('click', () => beendeRunde('admin_skip'));

            imageWrapper.addEventListener('click', function(e) {
                if (!isScanFinished) return;
                
                const imgRect = imgEl.getBoundingClientRect();
                const origKlickX = (e.clientX - imgRect.left) / scaleRatio;
                const origKlickY = (e.clientY - imgRect.top) / scaleRatio;
                
                let naechstesZeichen = null, minimaleDistanz = Infinity;
                
                aktuelleZeichenDaten.forEach(z => {
                    const distanz = Math.sqrt(Math.pow(origKlickX - z.center_x, 2) + Math.pow(origKlickY - z.center_y, 2));
                    if (distanz < minimaleDistanz) { minimaleDistanz = distanz; naechstesZeichen = z; }
                });

                if (naechstesZeichen && minimaleDistanz <= 40 && !naechstesZeichen.hat_ring) {
                    renderRing('image-wrapper', naechstesZeichen.center_x, naechstesZeichen.center_y, naechstesZeichen.is_small ? 'klein' : 'groß', 0.0, naechstesZeichen, scaleRatio, offsetX, offsetY);
                    naechstesZeichen.hat_ring = true;
                }
            });
        }
    };

    timeline.push({ timeline: [runden_trial], conditional_function: () => !experimentAborted && !(aktuelleVersuchsGruppe === 3 && runde < RUNDEN_OHNE_DRIFT + 1) });
}

// ==========================================
// 6. ABSCHLUSS-FRAGEBÖGEN
// ==========================================
const likert_scale = ["1 - Strongly Disagree", "2", "3", "4", "5", "6", "7 - Strongly Agree"];

timeline.push({ type: jsPsychSurveyText, preamble: '<div style="max-width: 800px; margin: 0 auto; text-align: left;"><h3>Recalibration</h3></div>', questions: [{prompt: "Why did you click on „Recalibrate“?<br>Please type your answer…", rows: 5, name: 'recalibrate_reason'}], conditional_function: () => experimentAborted });
timeline.push({ type: jsPsychSurveyLikert, preamble: `<div style="max-width: 800px; margin: 0 auto; text-align: left; margin-bottom: 20px;"><p>We are interested in your perceptions of the agent.<br>Please take your time to answer the following questions based on your experiences so far. There are no right or wrong answers.<br><br>Please indicate the degree to which you personally agree or disagree with the following statements.</p></div>`, questions: [{prompt: "I customized the agent before using it for the task.", name: 'cust_1', labels: likert_scale, required: true}, {prompt: "The agent I worked with was customized based on my instructions.", name: 'cust_2', labels: likert_scale, required: true}, {prompt: "The agent I worked with was customized based on my search strategy.", name: 'cust_3', labels: likert_scale, required: true}] });
timeline.push({ type: jsPsychSurveyLikert, preamble: `<div style="max-width: 800px; margin: 0 auto; text-align: left; margin-bottom: 20px;"><p>Please indicate the degree to which you personally agree or disagree with the following statements.</p></div>`, questions: [{prompt: "I trust the agent.", name: 'trust_1', labels: likert_scale, required: true}, {prompt: "I can rely on the agent.", name: 'trust_2', labels: likert_scale, required: true}] });
timeline.push({ type: jsPsychSurveyLikert, preamble: `<div style="text-align: left; max-width: 800px; margin: 0 auto; line-height: 1.6; margin-bottom: 30px;"><p>Now, imagine that you have reported the detected component defects to your company. During further processing of a component you inspected before the break, high porosity was detected.</p><p>An experienced engineer has raised concerns that serious errors were made in defect detection for this component, and that it was consequently misclassified. In short, they gave the classifications on this component a negative evaluation.</p><p style="margin-top: 20px;"><strong>Please indicate the degree to which you personally agree or disagree with the following statements.</strong></p></div>`, questions: [{prompt: "I am personally responsible for the misclassified component.", name: 'resp_1', labels: likert_scale, required: true}, {prompt: "The AI system is responsible for the misclassified component.", name: 'resp_2', labels: likert_scale, required: true}] });
timeline.push({ type: jsPsychHtmlButtonResponse, stimulus: `<div style="background:#0f172a; padding:40px; color:white; text-align:center; border-radius: 8px; max-width: 600px; margin: 40px auto;"><h2 style="color:#deff9a; margin-top:0;">Thank you!</h2><p style="font-size: 18px; margin-bottom: 20px;">We were interested in your interaction with the agent and whether you were interested in recalibrating, so there is no need for further recalibration.</p><p style="font-size: 18px; margin-bottom: 30px;">Thank you for participating.<br>You may close this window now.</p></div>`, choices: ['Finish & Save Data'] });

jsPsych.run(timeline);
</script>
</body>
